<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.t-Binary PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; }
        .glass { background: #111; border: 1px solid #333; border-radius: 20px; }
        .candle { width: 8px; border-radius: 2px; position: relative; }
        .up { background: #00ff88; }
        .down { background: #ff3366; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto space-y-4">
        <div class="glass p-4 flex justify-between items-center">
            <h1 class="font-bold text-green-500">G.t-Binary PRO</h1>
            <div id="price" class="font-mono font-bold text-xl text-green-400">1.08525</div>
        </div>

        <div class="glass h-48 flex items-end justify-center gap-1 p-4" id="chart">
            </div>

        <div class="glass p-6 text-center space-y-4">
            <div id="timerLabel" class="text-xs text-gray-500 uppercase">Analisando Mercado...</div>
            <div id="countdown" class="text-4xl font-mono font-bold text-blue-500">00:10</div>
            
            <div id="signal" class="text-5xl font-black py-4 text-gray-800">AGUARDAR</div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-green-600/20 text-green-500 p-4 rounded-xl font-bold border border-green-500/30 text-center">COMPRA</div>
                <div class="bg-red-600/20 text-red-500 p-4 rounded-xl font-bold border border-red-500/30 text-center">VENDA</div>
            </div>
        </div>
    </div>

    <script>
        const chart = document.getElementById('chart');
        const priceEl = document.getElementById('price');
        const countdownEl = document.getElementById('countdown');
        const signalEl = document.getElementById('signal');
        let timer = 10;

        // Função para criar velas visuais
        function addCandle() {
            const isUp = Math.random() > 0.5;
            const height = Math.floor(Math.random() * 60) + 20;
            const candle = document.createElement('div');
            candle.className = candle ${isUp ? 'up' : 'down'};
            candle.style.height = height + 'px';
            if(chart.children.length > 20) chart.removeChild(chart.firstChild);
            chart.appendChild(candle);
        }

        setInterval(() => {
            // Atualiza Preço
            let p = parseFloat(priceEl.innerText);
            p += (Math.random() - 0.5) * 0.0001;
            priceEl.innerText = p.toFixed(5);
            addCandle();

            // Lógica do Sinal
            timer--;
            if(timer < 0) {
                timer = 10;
                const win = Math.random() > 0.5;
                signalEl.innerText = win ? "CALL" : "PUT";
                signalEl.className = win ? "text-5xl font-black py-4 text-green-500 animate-bounce" : "text-5xl font-black py-4 text-red-500 animate-bounce";
            }
            countdownEl.innerText = 00:${timer < 10 ? '0'+timer : timer};
        }, 1000);
    </script>
</body>
</html>
