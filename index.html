<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.t-Binary Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050505; color: #ffffff; font-family: sans-serif; overflow-x: hidden; }
        .glass { background: rgba(17, 17, 17, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); }
        .price-up { color: #00ff88; text-shadow: 0 0 10px #00ff8855; }
        .price-down { color: #ff3366; text-shadow: 0 0 10px #ff336655; }
        .win-tag { background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 1px solid #00ff8855; }
    </style>
</head>
<body class="min-h-screen p-4 bg-[#050505]">
    <div class="max-w-5xl mx-auto space-y-6">
        <div class="glass p-6 rounded-2xl flex justify-between items-center border-l-4 border-l-green-500">
            <div>
                <h1 class="text-2xl font-black tracking-tighter">G.t-<span class="text-green-400">Binary</span> <span class="text-xs bg-white text-black px-2 py-0.5 rounded ml-2">PRO</span></h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Algoritmo de Alta Frequência</p>
            </div>
            <div id="currentPrice" class="text-3xl font-mono font-bold">1.08472</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 glass p-4 rounded-2xl h-80 relative">
                <canvas id="binaryChart"></canvas>
            </div>

            <div id="signalCard" class="glass p-6 rounded-2xl text-center space-y-4 transition-all duration-500">
                <p class="text-gray-400 text-xs font-bold tracking-widest uppercase">Análise em Tempo Real</p>
                <div id="signalDir" class="text-6xl font-black">--</div>
                <div class="space-y-2 pt-4">
                    <button onclick="registrarClick('COMPRA')" class="w-full bg-green-500 hover:bg-green-400 py-4 rounded-xl font-bold text-black transition-transform active:scale-95">COMPRA</button>
                    <button onclick="registrarClick('VENDA')" class="w-full bg-red-500 hover:bg-red-400 py-4 rounded-xl font-bold text-white transition-transform active:scale-95">VENDA</button>
                </div>
            </div>
        </div>

        <div class="glass rounded-2xl overflow-hidden">
            <div class="p-4 border-b border-white/10 bg-white/5 font-bold text-sm flex items-center">
                <i class="fas fa-history mr-2 text-green-400"></i> ÚLTIMAS ENTRADAS (HISTÓRICO WIN)
            </div>
            <div id="historyList" class="divide-y divide-white/5 text-sm">
                </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('binaryChart').getContext('2d');
        let dataP = Array.from({length: 30}, () => 1.08472 + (Math.random() * 0.002));
        
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(30).fill(''),
                datasets: [{ 
                    data: dataP, 
                    borderColor: '#00ff88', 
                    borderWidth: 3, 
                    tension: 0.4, 
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(0, 255, 136, 0.05)'
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                scales: { x: {display: false}, y: {display: false} },
                plugins: { legend: {display: false} }
            }
        });

        let price = 1.08472;
        setInterval(() => {
            const diff = (Math.random() - 0.5) * 0.0001;
            price += diff;
            const el = document.getElementById('currentPrice');
            el.innerText = price.toFixed(5);
            el.className = diff >= 0 ? 'text-3xl font-mono font-bold price-up' : 'text-3xl font-mono font-bold price-down';
            
            chart.data.datasets[0].data.shift();
            chart.data.datasets[0].data.push(price);
            chart.data.datasets[0].borderColor = diff >= 0 ? '#00ff88' : '#ff3366';
            chart.update('none');
        }, 1000);

        function updateSignal() {
            const isUp = Math.random() > 0.5;
            const s = document.getElementById('signalDir');
            const card = document.getElementById('signalCard');
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            s.innerText = isUp ? 'CALL' : 'PUT';
            s.className = isUp ? 'text-6xl font-black text-green-400 animate-pulse' : 'text-6xl font-black text-red-500 animate-pulse';
            
            // Adicionar ao histórico
            const history = document.getElementById('historyList');
            const entry = document.createElement('div');
            entry.className = 'p-4 flex justify-between items-center bg-black/20';
            entry.innerHTML = `
                <div class="flex items-center space-x-4">
                    <span class="text-gray-500 font-mono text-xs">${time}</span>
                    <span class="font-bold ${isUp ? 'text-green-400' : 'text-red-500'}">EUR/USD - ${isUp ? 'CALL' : 'PUT'}</span>
                </div>
                <span class="win-tag px-3 py-1 rounded-full text-[10px] font-bold">WIN</span>
            `;
            if(history.children.length > 5) history.lastChild.remove();
            history.prepend(entry);
        }

        setInterval(updateSignal, 15000); // Sinal novo a cada 15 segundos
        updateSignal();

        function registrarClick(tipo) {
            alert(tipo + " registrado no G.t-Binary Pro! Analisando expiração...");
        }
    </script>
</body>
</html>
