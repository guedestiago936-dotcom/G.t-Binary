<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estudo Bíblico Pro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #fff;
    }
    header {
      background: linear-gradient(90deg, #1e3a8a, #2563eb);
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }
    textarea {
      width: 100%;
      height: 80px;
      border-radius: 10px;
      border: none;
      padding: 10px;
      margin-top: 10px;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }
    .verse {
      font-style: italic;
      margin-top: 10px;
      color: #93c5fd;
    }
  </style>
</head>
<body><header>
  Estudo Bíblico Pro
</header><div class="container">  <div class="card">
    <h2>Versículo do Dia</h2>
    <p id="verseText">Clique no botão para gerar um versículo</p>
    <button onclick="generateVerse()">Gerar Versículo</button>
  </div>  <div class="card">
    <h2>Plano de Leitura</h2>
    <p>Dia 1: Salmos 23</p>
    <p>Dia 2: João 3</p>
    <p>Dia 3: Romanos 8</p>
  </div>  <div class="card">
    <h2>Anotações</h2>
    <textarea placeholder="Escreva sua reflexão..."></textarea>
  </div>  <div class="card">
    <h2>Busca Bíblica</h2>
    <input type="text" id="searchInput" placeholder="Digite palavra-chave...">
    <button onclick="searchVerse()">Buscar</button>
    <p id="searchResult"></p>
  </div></div><script>
  const verses = [
    "João 3:16 - Porque Deus amou o mundo de tal maneira...",
    "Salmos 23:1 - O Senhor é o meu pastor...",
    "Romanos 8:28 - Todas as coisas cooperam para o bem...",
    "Filipenses 4:13 - Tudo posso naquele que me fortalece"
  ];

  function generateVerse() {
    const random = verses[Math.floor(Math.random() * verses.length)];
    document.getElementById("verseText").innerText = random;
  }

  function searchVerse() {
    const input = document.getElementById("searchInput").value.toLowerCase();
    const result = verses.find(v => v.toLowerCase().includes(input));
    document.getElementById("searchResult").innerText = result || "Nenhum versículo encontrado";
  }
</script></body>
</html>
