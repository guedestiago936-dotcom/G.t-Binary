<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KimiBinary Pro - Análise para Opções Binárias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        binary: { bg: '#050505', card: '#0a0a0a', surface: '#111111', accent: '#00ff88', call: '#00ff88', put: '#ff3366', neutral: '#ffaa00', info: '#00ccff' }
                    },
                    animation: { 'pulse-fast': 'pulse 1.5s infinite', 'flash-green': 'flashGreen 0.5s ease-in-out', 'flash-red': 'flashRed 0.5s ease-in-out' },
                    keyframes: {
                        flashGreen: { '0%, 100%': { backgroundColor: 'transparent' }, '50%': { backgroundColor: 'rgba(0, 255, 136, 0.3)' } },
                        flashRed: { '0%, 100%': { backgroundColor: 'transparent' }, '50%': { backgroundColor: 'rgba(255, 51, 102, 0.3)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #050505; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass-panel { background: rgba(17, 17, 17, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-border-green { box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); border: 1px solid rgba(0, 255, 136, 0.4); }
        .neon-border-red { box-shadow: 0 0 20px rgba(255, 51, 102, 0.2); border: 1px solid rgba(255, 51, 102, 0.4); }
        .price-up { color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
        .price-down { color: #ff3366; text-shadow: 0 0 10px rgba(255, 51, 102, 0.5); }
        .chart-grid { background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 20px 20px; }
        .btn-call { background: linear-gradient(135deg, #00cc66 0%, #00ff88 100%); }
        .btn-put { background: linear-gradient(135deg, #cc0033 0%, #ff3366 100%); }
    </style>
</head>
<body class="min-h-screen">

    <header class="glass-panel sticky top-0 z-50 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-binary-accent to-binary-info flex items-center justify-center shadow-lg">
                    <i class="fas fa-bolt text-black text-xl"></i>
                </div>
                <h1 class="text-xl font-bold">Kimi<span class="text-binary-accent">Binary</span> Pro</h1>
            </div>
            <div class="flex items-center space-x-2 text-xs text-binary-accent font-bold">
                <span class="w-2 h-2 bg-binary-accent rounded-full animate-pulse"></span> SERVIDOR ATIVO
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-4">
                <div class="glass-panel rounded-2xl p-4">
                    <div class="flex justify-between mb-4">
                        <span class="text-xl font-bold font-mono" id="assetName">EUR/USD</span>
                        <span class="text-2xl font-bold font-mono" id="currentPrice">1.08472</span>
                    </div>
                    <div class="h-80 chart-grid relative rounded-xl border border-white/5 overflow-hidden">
                        <canvas id="binaryChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div id="mainSignal" class="glass-panel rounded-2xl p-6 border border-binary-accent/30 neon-border-green transition-all duration-500">
                    <div class="text-center">
                        <p class="text-xs text-gray-400 mb-2">SINAL DA INTELIGÊNCIA ARTIFICIAL</p>
                        <h2 id="signalDirection" class="text-5xl font-extrabold text-binary-accent mb-4">CALL</h2>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="trade('COMPRA')" class="btn-call py-4 rounded-xl font-bold text-black hover:opacity-90 active:scale-95 transition">COMPRA</button>
                            <button onclick="trade('VENDA')" class="btn-put py-4 rounded-xl font-bold text-white hover:opacity-90 active:scale-95 transition">VENDA</button>
                        </div>
                    </div>
                </div>

                <div class="glass-panel rounded-2xl p-5 border border-white/10">
                    <h3 class="font-bold mb-4"><i class="fas fa-calculator mr-2 text-binary-info"></i>Gerenciamento Soros</h3>
                    <div class="space-y-4">
                        <input type="number" id="entryValue" value="20" oninput="calcSoros()" class="w-full bg-binary-surface border border-white/10 rounded-lg p-2 text-white font-mono">
                        <div class="bg-black/40 p-3 rounded-lg text-sm space-y-2">
                            <div class="flex justify-between"><span>Nível 1:</span> <span id="lv1" class="font-mono text-binary-accent">R$ 37.00</span></div>
                            <div class="flex justify-between"><span>Nível 2:</span> <span id="lv2" class="font-mono text-binary-accent">R$ 68.45</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 1. Configuração do Gráfico
        const ctx = document.getElementById('binaryChart').getContext('2d');
        let chartData = Array.from({length: 30}, () => 1.08472 + (Math.random() - 0.5) * 0.001);
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(30).fill(''),
                datasets: [{
                    data: chartData,
                    borderColor: '#00ff88',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(0, 255, 136, 0.05)',
                    pointRadius: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { x: {display: false}, y: {display: false} }, plugins: {legend: {display: false}} }
        });

        // 2. Atualização em Tempo Real
        let price = 1.08472;
        setInterval(() => {
            const change = (Math.random() - 0.5) * 0.0001;
            price += change;
            document.getElementById('currentPrice').innerText = price.toFixed(5);
            document.getElementById('currentPrice').className = change >= 0 ? 'text-2xl font-bold font-mono price-up' : 'text-2xl font-bold font-mono price-down';
            
            chart.data.datasets[0].data.shift();
            chart.data.datasets[0].data.push(price);
            chart.data.datasets[0].borderColor = change >= 0 ? '#00ff88' : '#ff3366';
            chart.update('none');
        }, 1000);

        // 3. Sistema de Sinais
        function newSignal() {
            const isCall = Math.random() > 0.5;
            const dir = document.getElementById('signalDirection');
            const card = document.getElementById('mainSignal');
            
            dir.innerText = isCall ? 'CALL' : 'PUT';
            dir.style.color = isCall ? '#00ff88' : '#ff3366';
            card.className = isCall ? "glass-panel rounded-2xl p-6 border border-binary-accent/30 neon-border-green animate-flash-green" : "glass-panel rounded-2xl p-6 border border-binary-put/30 neon-border-red animate-flash-red";
        }
        setInterval(newSignal, 15000);

        // 4. Funções de Botão e Calculadora
        function trade(type) {
            alert(type + ' executado! Aguardando resultado da análise...');
        }

        function calcSoros() {
            const val = parseFloat(document.getElementById('entryValue').value) || 0;
            document.getElementById('lv1').innerText = 'R$ ' + (val * 1.85).toFixed(2);
            document.getElementById('lv2').innerText = 'R$ ' + ((val * 1.85) * 1.85).toFixed(2);
        }
    </script>
</body>
</html>
